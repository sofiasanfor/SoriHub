<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi perfil | SoriHub</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/perfil.css">

</head>

<body>

<div class="perfil">

    <!-- VOLVER -->

    <div class="volver">

        <button
            type="button"
            onclick="volverPanel()">

            ← Volver al panel

        </button>

    </div>

    <!-- FOTO -->

    <div
        class="foto-container"
        onclick="cambiarFoto()">

        <img
            id="fotoPerfil"
            class="foto"
            src="img/user.png">

        <div class="overlay">
            📷
        </div>

    </div>

    <button
        id="btnEliminarFoto"
        class="secundario eliminar-btn"
        onclick="eliminarFoto()">

        Eliminar foto

    </button>

    <input
        id="inputFoto"
        type="file"
        accept="image/*"
        onchange="subirFoto(event)">

    <!-- NOMBRE -->

    <h2 id="nombreUsuario">
        Usuario
    </h2>

    <!-- DATOS -->

    <input
        id="nombre"
        class="campo"
        type="text"
        placeholder="Nombre">

    <input
        id="apellido"
        class="campo"
        type="text"
        placeholder="Apellido">

    <input
        id="correo"
        class="campo"
        type="email"
        placeholder="Correo electrónico">

    <!-- CONTRASEÑA -->

    <button
        type="button"
        onclick="togglePassword()">

        Cambiar contraseña

    </button>

    <div
        id="formPassword"
        style="display:none;">

        <input
            id="passActual"
            class="campo"
            type="password"
            placeholder="Contraseña actual">

        <div style="text-align:left;">

            <span
                class="olvide-pass"
                onclick="olvido()">

                ¿Olvidaste tu contraseña?

            </span>

        </div>

        <input
            id="passNueva"
            class="campo"
            type="password"
            placeholder="Nueva contraseña">

        <input
            id="passConfirmar"
            class="campo"
            type="password"
            placeholder="Confirmar contraseña">

        <button
            type="button"
            onclick="guardarPassword()">

            Guardar nueva contraseña

        </button>

    </div>

    <!-- GUARDAR -->

    <button
        type="button"
        onclick="guardarPerfil()">

        Guardar cambios

    </button>

    <!-- MENSAJES -->

    <div
        id="mensaje"
        class="mensaje">

    </div>

    <!-- CERRAR SESIÓN -->

    <button
        type="button"
        class="secundario"
        onclick="cerrarSesion()">

        Cerrar sesión

    </button>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/perfil.js"></script>

</body>

</html>
