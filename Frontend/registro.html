<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | SoriHub</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/registro.css">

</head>

<body>

    <div class="contenedor">
        <div class="registro">

            <!-- ========================= -->
            <!-- FORMULARIO -->
            <!-- ========================= -->

            <div id="formRegistro">
                <img src="logo.png" class="logo">

                <h2>Crear cuenta</h2>

                <p class="descripcion">
                    Registra tu cuenta para solicitar acceso a SoriHub.
                </p>

                <input
                    id="nombre"
                    type="text"
                    placeholder="Nombre">

                <input
                    id="apellido"
                    type="text"
                    placeholder="Apellido">

                <input
                    id="correo"
                    type="email"
                    placeholder="Correo electrónico">

                <input
                    id="password"
                    type="password"
                    placeholder="Contraseña"
                    onkeypress="if(event.key==='Enter') registrar()">

                <button onclick="registrar()">
                    Crear cuenta
                </button>

                <div id="mensaje" class="mensaje"></div>
                <div class="acciones">

                    <a href="index.html">
                        Ya tengo una cuenta
                    </a>

                </div>
            </div>

            <!-- ========================= -->
            <!-- REGISTRO EXITOSO -->
            <!-- ========================= -->

            <div id="registroExitoso" class="oculto">
                <img src="logo.png" class="logo">

                <h2>🎉 ¡Cuenta creada!</h2>

                <p class="descripcion">
                    Tu solicitud fue registrada correctamente.
                    <br><br>
                    Un administrador revisará tu cuenta y te asignará un rol para acceder a SoriHub.
                    <br><br>
                    Una vez aprobada podrás iniciar sesión normalmente.
                </p>

                <button onclick="window.location='index.html'">
                    Ir al inicio de sesión
                </button>

            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/registro.js"></script>

</body>

</html>
