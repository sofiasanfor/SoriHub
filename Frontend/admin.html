async function guardarCompra(){

let productoId =
document.getElementById(
"productoCompra"
).value

let cantidad =
document.getElementById(
"cantidadCompra"
).value

let precio =
document.getElementById(
"precioCompra"
).value

let proveedor =
document.getElementById(
"proveedorCompra"
).value

let iva =
Number(
document.getElementById(
"ivaCompra"
).value || 0
)

let descuento =
Number(
document.getElementById(
"descuentoCompra"
).value || 0
)

if(
!productoId ||
!cantidad ||
!precio ||
!proveedor
){

alert("Completa todos los campos")
return

}

try{

let usuario =
JSON.parse(localStorage.getItem("usuario"))

let res = await fetch("/agregar-compra",{

method:"POST",

headers:{
"Content-Type":"application/json",
"x-admin-email": usuario.correo
},

body:JSON.stringify({

productoId,
cantidad,
precio,
proveedor,
iva,
descuento

})

})

let data = await res.json()

alert("Compra guardada 💕")

cargarCompras()
cerrarModalCompra()
mostrarCompras()

}catch(e){

console.log(e)

alert("Error guardando compra")

}

}

async function cargarCompras(){

let cont =
document.getElementById("listaCompras")

let res =
await fetch("/compras")

let compras =
await res.json()

cont.innerHTML = ""

compras.forEach(c=>{

cont.innerHTML += `

<div class="card-compra">

<h3>${c.producto}</h3>

<p>
Cantidad: ${c.cantidad}
</p>

<p>
Proveedor: ${c.proveedor}
</p>

<p>
IVA: ${c.iva || 0}%
</p>

<p>
Descuento: ${c.descuento || 0}%
</p>

<p>
Total:
$${Math.round(Number(c.total)).toLocaleString("es-CO")}
</p>

<button
onclick="eliminarCompra('${c._id}')"
class="btn-eliminar"
>
Eliminar
</button>

</div>

`

})

}

cargarCompras()

async function reiniciarCompras(){

let confirmar = confirm(
"¿Seguro que quieres borrar todas las compras?"
)

if(!confirmar) return

try{

await fetch("/reiniciar-compras",{

method:"DELETE"

})

document.getElementById(
"listaCompras"
).innerHTML = ""

alert("Compras reiniciadas 💕")

}catch(e){

console.log(e)

alert("Error reiniciando compras")

}

}

async function eliminarCompra(id){

if(
!confirm(
"¿Eliminar esta compra?"
)
) return

await fetch(
"/compra/" + id,
{
method:"DELETE"
}
)

cargarCompras()

}

async function toggleAgotado(id){

// 🔥 1. obtener producto actualizado
let productos = await fetch("/productos").then(r=>r.json())
let p = productos.find(x => x._id === id)

if(!p){
  alert("Producto no encontrado")
  return
}

// 🔥 2. lógica REAL basada en estado actual
if(p.stock === 0){

  let nuevoStock = prompt("¿Cuánto stock quieres agregar?")

  if(!nuevoStock) return

  nuevoStock = Number(nuevoStock.trim())

  if(isNaN(nuevoStock) || nuevoStock <= 0){
    alert("Stock inválido")
    return
  }

  let formData = new FormData()
  formData.append("stock", nuevoStock)

  await fetch("/productos/" + id, {
method:"PUT",
headers: headersAdmin,
body: formData
})

  alert("Producto reactivado 💚")

}else{

  let formData = new FormData()
  formData.append("stock", 0)

  await fetch("/productos/" + id, {
    method:"PUT",
    headers: headersAdmin,
    body: formData
})

  alert("Producto marcado como agotado 🚫")
}

// 🔥 3. recargar bien
setTimeout(() => {
  mostrarProductos()
}, 150)

}

)

async function toggleCarrusel(id, card){

let texto = card.querySelector(".estado")

// 🔁 toggle local inmediato (UI rápida)
if(window.carruselSeleccion.has(id)){
  window.carruselSeleccion.delete(id)

  card.style.border = "1px solid rgba(255,255,255,0.1)"
  texto.innerText = "Seleccionar"
  texto.style.color = "var(--color-texto)"
  texto.style.opacity = "0.6"

}else{
  window.carruselSeleccion.add(id)

  card.style.border = "2px solid var(--color-secundario)"
  texto.innerText = "✔ En carrusel"
  texto.style.color = "var(--color-secundario)"
  texto.style.opacity = "1"
}

// 🚀 GUARDADO AUTOMÁTICO (sin botón)
try{

  await fetch("/carrusel", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      ...headersAdmin
    },
    body: JSON.stringify({
      productos: Array.from(window.carruselSeleccion)
    })
  })

}catch(e){

  console.error("Error guardando carrusel", e)

}
}

let imagenesOrden = []

function previewImgs(){
  // 🔥 cuando el usuario selecciona archivos
  imagenesOrden = Array.from(document.getElementById("imagenes").files)
  renderImgs()
}

function renderImgs(){

  let cont = document.getElementById("previewImgs")

  cont.innerHTML = imagenesOrden.map((f,i)=>`
  <div draggable="true" 
       ondragstart="dragStart(${i})"
       ondragover="dragOver(event)"
       ondrop="dropItem(event, ${i})"
       style="
         display:flex;
         justify-content:space-between;
         background:#2a2a3a;
         padding:10px;
         border-radius:10px;
         margin:6px 0;
         cursor:grab;
       ">

    <span>${f.name}</span>
    <span style="opacity:0.5;">☰</span>

  </div>
  `).join("")
}

let dragIndex = null

function dragStart(index){
  dragIndex = index
}

function dragOver(e){
  e.preventDefault()
}

function dropItem(e, dropIndex){
  e.preventDefault()

  const rect = e.currentTarget.getBoundingClientRect()
  const offset = e.clientY - rect.top

  let newIndex = dropIndex

  // 🔥 si sueltas en la mitad de abajo → baja
  if(offset > rect.height / 2){
    newIndex = dropIndex + 1
  }

  const item = imagenesOrden[dragIndex]

  imagenesOrden.splice(dragIndex, 1)

  // 🔥 ajustar índice si se movió hacia abajo
  if(dragIndex < newIndex) newIndex--

  imagenesOrden.splice(newIndex, 0, item)

  renderImgs()
}

async function agregarDescuento(id){

let res = await fetch("/productos")
let productos = await res.json()
let p = productos.find(x => x._id === id)

// 🟥 SI YA TIENE PROMO → ELIMINAR
if(p.promo === true){

let formData = new FormData()
formData.append("promo", "false")
formData.append("descuento", 0)
formData.append("precioPromo", 0)

await fetch("/productos/"+id,{
  method:"PUT",
  body: formData
})

alert("Promoción eliminada 💔")
mostrarProductos()
return
}

// 🟢 SI NO TIENE → CREAR
let descuento = prompt("Porcentaje de descuento (ej: 40)")

if(!descuento) return

let precioOriginal = Number(p.precio)
let precioPromo = Math.round(precioOriginal - (precioOriginal * descuento / 100))

let formData = new FormData()
formData.append("promo", "true")
formData.append("descuento", Number(descuento))
formData.append("precioPromo", precioPromo)

await fetch("/productos/"+id,{
  method:"PUT",
  body: formData
})

alert("Promoción aplicada 🔥")
mostrarProductos()
}

function renderImgsEdit(){

  let cont = document.getElementById("imagenesActuales") // 👈 traerlo aquí

  if(!cont) return // por si acaso

  cont.innerHTML = window.imagenesEdit.map((img,i)=>`
  
  <div draggable="true" 
       ondragstart="dragStartEdit(${i})"
       ondragover="dragOverEdit(event)"
       ondrop="dropEdit(event, ${i})"
       style="
         display:flex;
         justify-content:space-between;
         align-items:center;
         background:var(--color-card);
         padding:10px;
         border-radius:10px;
         margin:6px 0;
         cursor:grab;
       ">

   <div style="display:flex; align-items:center; gap:10px;">

  <span style="
    cursor:grab;
    opacity:0.5;
    font-size:18px;
  ">☰</span>

  <img src="${img}" style="
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
  ">

</div>

<span onclick="eliminarImg(${i})" style="
  cursor:pointer;
  font-size:18px;
  color:var(--color-texto);
">✖</span>

  </div>
  `).join("")
}

let dragIndexEdit = null

function dragStartEdit(index){
  dragIndexEdit = index
}

function dragOverEdit(e){
  e.preventDefault()
}

function dropEdit(e, dropIndex){
  e.preventDefault()

  const rect = e.currentTarget.getBoundingClientRect()
  const offset = e.clientY - rect.top

  let newIndex = dropIndex

  if(offset > rect.height / 2){
    newIndex = dropIndex + 1
  }

  const item = window.imagenesEdit[dragIndexEdit]

  window.imagenesEdit.splice(dragIndexEdit, 1)

  if(dragIndexEdit < newIndex) newIndex--

  window.imagenesEdit.splice(newIndex, 0, item)

  renderImgsEdit()
}

function eliminarImg(i){
  window.imagenesEdit.splice(i,1)
  renderImgsEdit()
}

function textoANumero(texto){

texto = texto.toLowerCase()

let mapa = {
uno:1, dos:2, tres:3, cuatro:4, cinco:5,
seis:6, siete:7, ocho:8, nueve:9, diez:10,
veinte:20, treinta:30, cuarenta:40, cincuenta:50,
cien:100, ciento:100, mil:1000
}

if(!isNaN(texto)) return Number(texto)

let palabras = texto.split(" ")
let total = 0

palabras.forEach(p=>{
if(mapa[p]) total += mapa[p]
})

return total || 0
}
